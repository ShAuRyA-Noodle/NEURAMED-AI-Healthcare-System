[pytest]
testpaths = tests
pythonpath = .
asyncio_mode = auto
; main.py replaces sys.stdout/sys.stderr with a fresh TextIOWrapper on
; Windows at import time (Indian-language console fix). That grabs pytest's
; capture buffer and crashes at teardown ("I/O operation on closed file"),
; so disable capture until main.py guards that hijack. See task report.
addopts = -s
filterwarnings =
    ignore::DeprecationWarning
