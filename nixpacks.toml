[phases.setup]
# poppler is required by pdf2image (provides pdftoppm)
# tesseract is required by pytesseract OCR fallback
nixPkgs = ["python311", "tesseract", "poppler_utils"]

[phases.install]
cmds = ["pip install -r backend/requirements.txt"]

[start]
cmd = "cd backend && uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
